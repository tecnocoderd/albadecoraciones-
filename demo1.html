<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura Simplificada - Alba Decoraciones</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --border: #cccccc;
            --text: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 10px;
            font-size: 12px;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        header h1 { font-size: 20px; color: var(--primary); text-transform: uppercase; }
        header p { font-size: 11px; color: #555; margin-top: 2px; }

        .card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .card h2 {
            font-size: 12px;
            margin-bottom: 6px;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 1px;
            font-weight: bold;
            font-size: 10px;
        }

        input, select {
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 11px;
        }

        button {
            background: var(--primary);
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }

        button:hover { opacity: 0.9; }
        
        .btn-accent { background: var(--accent); }
        .btn-danger { background: #c0392b; }
        .btn-success { background: #27ae60; }

        .ventana-row {
            display: flex;
            gap: 6px;
            align-items: flex-end;
            background: #f1f2f6;
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 6px;
            border: 1px solid #ddd;
        }

        .ventana-row .form-group {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            font-size: 11px;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 5px;
            text-align: left;
        }

        th { background: #eaeded; color: var(--primary); font-weight: bold; }

        .totales-box {
            text-align: right;
            font-size: 12px;
        }
        .totales-box div { margin: 2px 0; }
        .grand-total { font-size: 14px; font-weight: bold; color: var(--accent); }

        .no-print-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        /* VISTA DE IMPRESIÓN SÚPER LIMPIA (1 HOJA ASEGURADA) */
        @media print {
            @page {
                size: portrait;
                margin: 0.5cm;
            }
            body { 
                background: white; 
                color: black; 
                padding: 0; 
                font-size: 10px; 
            }
            .card { border: none; padding: 0; margin-bottom: 8px; }
            .card h2 { font-size: 11px; margin-bottom: 4px; }
            
            /* Ocultar la zona de entrada de datos de ventanas y botones */
            #selector-ventanas, .no-print-actions, .btn-danger, td:last-child, th:last-child { 
                display: none !important; 
            }
            
            input { border: none; background: transparent; padding: 0; pointer-events: none; font-size: 10px; }
            table { font-size: 9px; }
            th, td { padding: 4px; border: 1px solid #555; }
            th { background: #f0f0f0 !important; }
            .totales-box { margin-top: 8px; }
            .grand-total { font-size: 12px; color: black; }
            header { padding: 4px 0; margin-bottom: 8px; }
            header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Encabezado -->
    <header>
        <h1>Alba Decoraciones</h1>
        <p>Teléfonos: 829 263 1340 | 849 856 4191 &bull; Instagram: Albadecoraciones.dom</p>
    </header>

    <!-- Cliente -->
    <div class="card">
        <h2>Datos del Cliente</h2>
        <div class="grid-3">
            <div class="form-group">
                <label>Cliente / Proyecto:</label>
                <input type="text" id="client-name" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" id="client-phone" placeholder="Teléfono">
            </div>
            <div class="form-group">
                <label>No. Cotización:</label>
                <input type="text" id="invoice-num" placeholder="0001">
            </div>
        </div>
    </div>

    <!-- Generador de Medidas (Se oculta al imprimir) -->
    <div class="card" id="selector-ventanas">
        <h2>Configurar Medidas de Ventanas (No sale en el PDF)</h2>
        <div id="ventanas-lista"></div>
        <div style="margin-top: 8px;">
            <button type="button" onclick="agregarVentana()">+ Agregar Ventana</button>
        </div>
    </div>

    <!-- Botonera de Extras -->
    <div class="no-print-actions">
        <button type="button" class="btn-accent" onclick="agregarArticuloExtra('Bastón de 36 cm', 390)">+ Bastón 36cm (RD$390)</button>
        <button type="button" class="btn-accent" onclick="agregarArticuloExtra('Bastón de 60 cm', 500)">+ Bastón 60cm (RD$500)</button>
        <button type="button" class="btn-accent" onclick="agregarArticuloExtra('Artículo Extra', 0)">+ Agregar Otro Artículo</button>
        <button type="button" class="btn-success" style="margin-left: auto;" onclick="window.print()">Imprimir / Guardar PDF</button>
    </div>

    <!-- Factura Final Sencilla -->
    <div class="card">
        <h2>Detalle de Factura</h2>
        <table>
            <thead>
                <tr>
                    <th>Descripción</th>
                    <th style="width: 70px; text-align: center;">Cant.</th>
                    <th style="width: 100px; text-align: right;">Precio Unitario</th>
                    <th style="width: 120px; text-align: right;">Total</th>
                    <th class="no-print-column" style="width: 40px; text-align: center;">X</th>
                </tr>
            </thead>
            <tbody id="tabla-materiales">
                <!-- Se llena automáticamente con 1 sola fila por ventana -->
            </tbody>
        </table>
    </div>

    <!-- Totales -->
    <div class="card totales-box">
        <div class="form-group" style="max-width: 160px; margin-left: auto; margin-bottom: 5px;">
            <label>Descuento Directo (RD$):</label>
            <input type="number" id="descuento-input" value="0" min="0" style="text-align: right;" oninput="calcularTodo()">
        </div>
        <div>Subtotal: <strong id="subtotal-neto">RD$ 0.00</strong></div>
        <div>Descuento: <strong id="descuento-total">-RD$ 0.00</strong></div>
        <div class="grand-total" style="margin-top: 4px;">Total a Pagar: <span id="total-general">RD$ 0.00</span></div>
    </div>
</div>

<script>
    // Tarifas base de insumos y materiales en RD$
    const PRECIOS = {
        barra10: 1050, barra12: 1200, barra14: 1250, barra16: 1450,
        blackout: 480, visillo: 300, carritoOndas: 175, cinta: 120,
        soporteTerminales: 500, cintaBroche: 120, carritoTachones: 350, ganchoTachones: 70
    };

    const BARRAS_CM = [
        { label: 'Barra 10 Pies', cm: 304.8, precio: 1050 },
        { label: 'Barra 12 Pies', cm: 365.76, precio: 1200 },
        { label: 'Barra 14 Pies', cm: 426.72, precio: 1250 },
        { label: 'Barra 16 Pies', cm: 487.68, precio: 1450 }
    ];

    let ventanaCount = 0;
    let extras = [];

    function agregarVentana() {
        ventanaCount++;
        const lista = document.getElementById('ventanas-lista');
        const div = document.createElement('div');
        div.className = 'ventana-row';
        div.id = `v-row-${ventanaCount}`;
        div.innerHTML = `
            <div class="form-group" style="flex: 1.5;">
                <label>Ubicación / Ref:</label>
                <input type="text" class="v-nombre" value="Ventana ${ventanaCount}" oninput="calcularTodo()">
            </div>
            <div class="form-group" style="width: 70px;">
                <label>Ancho (cm):</label>
                <input type="number" class="v-ancho" value="150" oninput="calcularTodo()">
            </div>
            <div class="form-group" style="width: 70px;">
                <label>Largo (cm):</label>
                <input type="number" class="v-largo" value="200" oninput="calcularTodo()">
            </div>
            <div class="form-group">
                <label>Confección:</label>
                <select class="v-confeccion" onchange="calcularTodo()">
                    <option value="ondas">Ondas</option>
                    <option value="tachones">Tachones</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tipo Tela:</label>
                <select class="v-tela" onchange="calcularTodo()">
                    <option value="visillo">Visillo</option>
                    <option value="blackout">Blackout</option>
                    <option value="doble">Doble</option>
                </select>
            </div>
            <button type="button" class="btn-danger" style="padding: 4px 8px;" onclick="eliminarVentana(${ventanaCount})">X</button>
        `;
        lista.appendChild(div);
        calcularTodo();
    }

    function eliminarVentana(id) {
        document.getElementById(`v-row-${id}`).remove();
        calcularTodo();
    }

    function agregarArticuloExtra(nombre, precio) {
        extras.push({ descripcion: nombre, precio: precio });
        calcularTodo();
    }

    function eliminarExtra(index) {
        extras.splice(index, 1);
        calcularTodo();
    }

    function actualizarExtra(index, campo, valor) {
        if (campo === 'descripcion') extras[index].descripcion = valor;
        if (campo === 'precio') extras[index].precio = parseFloat(valor) || 0;
        calcularTodo();
    }

    function obtenerBarra(ancho) {
        for (let b of BARRAS_CM) {
            if (b.cm > ancho) return b;
        }
        return BARRAS_CM[3]; // Fallback barra de 16 pies
    }

    // ALGORITMO INTEGRADO: Calcula el costo de la ventana completa y lo resume en una sola fila
    function calcularTodo() {
        const tbody = document.getElementById('tabla-materiales');
        tbody.innerHTML = '';
        let subtotal = 0;

        // Procesar cada ventana configurada
        const filasVentanas = document.querySelectorAll('.ventana-row');
        filasVentanas.forEach(f => {
            const nombre = f.querySelector('.v-nombre').value;
            const ancho = parseFloat(f.querySelector('.v-ancho').value) || 0;
            const largo = parseFloat(f.querySelector('.v-largo').value) || 0;
            const confeccion = f.querySelector('.v-confeccion').value;
            const tela = f.querySelector('.v-tela').value;

            if (ancho <= 0) return;

            // Determinar si es doble (Regla del punto 2)
            const esDoble = (tela === 'doble');
            const factorDoble = esDoble ? 2 : 1;

            // 1. Costo de barra(s) e instalación
            const barra = obtenerBarra(ancho);
            const costoSoporteInstalacion = PRECIOS.soporteTerminales * factorDoble;
            const costoBarraTotal = barra.precio * factorDoble;

            // 2. Costo de telas (Regla del 2.5 convertido a yardas)
            const metrosRiel = ancho / 100;
            const metrosTela = metrosRiel * 2.5;
            let yardas = Math.ceil(metrosTela / 0.9144);
            if (yardas < 1) yardas = 1;

            let costoTelas = 0;
            if (tela === 'visillo' || esDoble) costoTelas += yardas * PRECIOS.visillo;
            if (tela === 'blackout' || esDoble) costoTelas += yardas * PRECIOS.blackout;

            // 3. Costo de Accesorios específicos de la confección
            let costoAccesorios = 0;
            if (confeccion === 'ondas') {
                let yardasAccesorios = Math.ceil(yardas * 0.7);
                if (yardasAccesorios < 1) yardasAccesorios = 1;
                costoAccesorios += (yardasAccesorios * PRECIOS.carritoOndas * factorDoble);
                costoAccesorios += (yardas * PRECIOS.cinta * factorDoble);
                costoAccesorios += (yardas * PRECIOS.cintaBroche * factorDoble);
            } else if (confeccion === 'tachones') {
                costoAccesorios += PRECIOS.carritoTachones + PRECIOS.ganchoTachones; // 1 paquete de cada uno
            }

            // Suma total del servicio integrado para esta ventana
            const precioVentanaCompleta = costoBarraTotal + costoSoporteInstalacion + costoTelas + costoAccesorios;
            subtotal += precioVentanaCompleta;

            // Añadir una única línea por ventana a la factura
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>Cortina Completa: ${nombre}</strong> (${confeccion.toUpperCase()}, ${tela.toUpperCase()}) - ${ancho}x${largo} cm</td>
                <td style="text-align: center;">1</td>
                <td style="text-align: right;">RD$ ${precioVentanaCompleta.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td style="text-align: right;">RD$ ${precioVentanaCompleta.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td class="no-print-column" style="text-align: center; color: #777;">Auto</td>
            `;
            tbody.appendChild(tr);
        });

        // Procesar artículos extras
        extras.forEach((item, index) => {
            subtotal += item.precio;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="editable-td"><input type="text" value="${item.descripcion}" oninput="actualizarExtra(${index}, 'descripcion', this.value)"></td>
                <td style="text-align: center;">1</td>
                <td class="editable-td"><input type="number" value="${item.precio}" style="text-align: right;" oninput="actualizarExtra(${index}, 'precio', this.value)"></td>
                <td style="text-align: right;">RD$ ${item.precio.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td class="no-print-column" style="text-align: center;"><button type="button" class="btn-danger" style="padding: 1px 4px; font-size: 9px;" onclick="eliminarExtra(${index})">X</button></td>
            `;
            tbody.appendChild(tr);
        });

        // Totales finales
        document.getElementById('subtotal-neto').innerText = `RD$ ${subtotal.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
        const desc = parseFloat(document.getElementById('descuento-input').value) || 0;
        document.getElementById('descuento-total').innerText = `-RD$ ${desc.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
        
        let total = subtotal - desc;
        if (total < 0) total = 0;
        document.getElementById('total-general').innerText = `RD$ ${total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
    }

    // Inicializar con la primera ventana lista
    agregarVentana();
</script>

</body>
</html>
